<h1>Apply for Loan</h1>

<input type="text" id="name" placeholder="Your Name"><br>
<input type="text" id="phone" placeholder="Phone Number"><br>
<textarea id="details" placeholder="Loan Details"></textarea><br>

<button onclick="sendWhatsApp()">Submit</button>

<script>
function sendWhatsApp() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var details = document.getElementById("details").value;

    var message = "New Loan Application:%0AName: " + name + "%0APhone: " + phone + "%0ADetails: " + details;

    var url = "https://wa.me/917570926476?text=" + message;

    window.open(url, '_blank');
}
</script>
