<h1>Apply for Loan</h1>

<!-- Gmail Form for Loan Application -->
<form onsubmit="sendGmail(); return false;">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <textarea id="details" placeholder="Loan Details" required></textarea>
    <button type="submit">Submit</button>
</form>

<script>
function sendGmail() {
    // Get values from form
    var name = document.getElementById("name").value;
    var mobile = document.getElementById("mobile").value;
    var details = document.getElementById("details").value;

    // Email subject and body
    var subject = "New Loan Application";
    var body = "Name: " + name + "%0AMobile: " + mobile + "%0ADetails: " + details;

    // Replace with your Gmail address
    var mailtoLink = "mailto:upkarsewas@gmail.com?subject=" + subject + "&body=" + body;

    // Open Gmail compose window
    window.open(mailtoLink, '_blank');
}
</script>
